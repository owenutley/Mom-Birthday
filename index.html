<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Mom!</title>
    <!-- Link to your CSS file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Happy Birthday to the Best Mom!</h1>
    </header>

    <main>
        <section class="photo-gallery">
            <div class="slideshow-container">
                <!-- Slide 1 (Active by default) -->
                <div class="slide active">
                    <img src="photo1.jpg" alt="Mom memory 1">
                </div>

                <!-- Slide 2 -->
                <div class="slide">
                    <img src="photo2.jpg" alt="Mom memory 2">
                </div>

                <!-- Slide 3 -->
                <div class="slide">
                    <img src="photo3.jpg" alt="Mom memory 3">
                </div>

                <!-- Slide 4 -->
                <div class="slide">
                    <img src="photo4.jpg" alt="Mom memory 4">
                </div>

                <!-- Slide 5 -->
                <div class="slide">
                    <img src="photo5.jpg" alt="Mom memory 5">
                </div>

                <!-- Slide 6 -->
                <div class="slide">
                    <img src="photo6.jpg" alt="Mom memory 6">
                </div>

                <!-- Slide 7 -->
                <div class="slide">
                    <img src="photo7.jpg" alt="Mom memory 7">
                </div>

                <!-- Slide 8 -->
                <div class="slide">
                    <img src="photo8.jpg" alt="Mom memory 8">
                </div>

                <!-- Navigation Buttons -->
                <button class="slide-btn prev-btn" onclick="changeSlide(-1)">&#10094; Prev</button>
                <button class="slide-btn next-btn" onclick="changeSlide(1)">Next &#10095;</button>
            </div>
        </section>

        <section class="message-board">
            <h2>Mom!</h2>
            <!-- Write your heartfelt birthday message here -->
            <p>
                Thank you so much for helping me to grow up to be me!<hr>
                Also, for being patient with me through my quirks,<hr>
                and being there for me when I couldn't do it alone.
            </p>
            <h2>Love Owen</h2>
        </section>
    </main>

    <!-- Link to your JavaScript file at the end of the body -->
    <script src="script.js"></script>
</body>

</html>
