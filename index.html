<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Mom!</title>
    <!-- Link to your CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Happy Birthday to the Best Mom!</h1>
    </header>

    <main>
        <section class="photo-gallery">
            <!-- Replace 'placeholder.jpg' with a real image file name -->
            <img src="placeholder.jpg" alt="A lovely photo of Mom">
        </section>

        <section class="message-board">
            <h2>My Message to You</h2>
            <!-- Write your heartfelt birthday message here -->
            <p>[Your personal birthday message goes here...]</p>
        </section>

        <section class="interactive-surprise">
            <!-- A button to trigger a JavaScript effect -->
            <button id="surpriseBtn">Click for a Surprise!</button>
        </section>
    </main>

    <!-- Link to your JavaScript file at the end of the body -->
    <script src="script.js"></script>
</body>
</html>
