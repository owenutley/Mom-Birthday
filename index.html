<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Mom!</title>
    <!-- Link to your CSS file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Happy Birthday!<br>To the best Parents in the world!</h1>
    </header>

    <main>
        <section class="photo-gallery">
            <div class="slideshow-container">
                <!-- Slide 1 (Active by default) -->
                <div class="slide active">
                    <img src="photo1.jpg" alt="Mom memory 1">
                </div>

                <!-- Slide 2 -->
                <div class="slide">
                    <img src="photo2.jpg" alt="Mom memory 2">
                </div>

                <!-- Slide 3 -->
                <div class="slide">
                    <img src="photo3.jpg" alt="Mom memory 3">
                </div>

                <!-- Slide 4 -->
                <div class="slide">
                    <img src="photo4.jpg" alt="Mom memory 4">
                </div>

                <!-- Slide 5 -->
                <div class="slide">
                    <img src="photo5.jpg" alt="Mom memory 5">
                </div>

                <!-- Slide 6 -->
                <div class="slide">
                    <img src="photo6.jpg" alt="Mom memory 6">
                </div>

                <!-- Slide 7 -->
                <div class="slide">
                    <img src="photo7.jpg" alt="Mom memory 7">
                </div>

                <!-- Slide 8 -->
                <div class="slide">
                    <img src="photo8.jpg" alt="Mom memory 8">
                </div>

                <!-- Slide 9 -->
                <div class="slide">
                    <img src="photo9.jpg" alt="Mom memory 9">
                </div>

                <!-- Slide 10 -->
                <div class="slide">
                    <img src="photo10.jpg" alt="Mom memory 10">
                </div>

                <!-- Slide 11 -->
                <div class="slide">
                    <img src="photo11.jpg" alt="Mom memory 11">
                </div>

                <!-- Slide 12 -->
                <div class="slide">
                    <!-- width="100%" makes sure the video fits perfectly inside your slideshow container -->
                    <video width="100%" controls>
                        <source src="video.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>

                <!-- Navigation Buttons -->
                <button class="slide-btn prev-btn" onclick="changeSlide(-1)">&#10094; Prev</button>
                <button class="slide-btn next-btn" onclick="changeSlide(1)">Next &#10095;</button>
            </div>
        </section>

        <section class="message-board">
            <h2>Mom and Dad</h2>
            <!-- Write your heartfelt birthday message here -->
            <p>
                Thank you so much for helping me to grow up to be me!<br>
                Also, for being patient with me through my quirks,<br>
                and being there for me when I couldn't do it alone!<br>
                I love you both!
            </p>
            <h2>Love Owen</h2>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <!-- Link to your JavaScript file at the end of the body -->
    <script src="script.js"></script>
</body>

</html>
